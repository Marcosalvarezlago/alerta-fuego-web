<style>
  :root{
    --rojo:#dc2626; --rojo-suave:#fee2e2;
    --azul:#2563eb;
    --ambar:#f59e0b; --ambar-suave:#fef3c7;
    --verde:#10b981; --verde-suave:#d1fae5;
    --tinta:#0f172a; --gris:#64748b; --borde:#e2e8f0; --fondo:#f8fafc;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;

  #app{display:flex;flex-direction:column;height:100%}

  header{
    background:#111827;color:#fff;padding:10px 14px;
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;

  header h1{font-size:1.05rem;margin:0;font-weight:800}
  header .tag{
    font-size:.68rem;letter-spacing:.09em;text-transform:uppercase;
    background:#7f1d1d;padding:3px 9px;border-radius:999px;font-weight:700;

  header .aviso{font-size:.78rem;opacity:.9;margin-left:auto}

    background:#fff;border-bottom:1px solid var(--borde);

  }
  .chip{
    flex:1 1 160px;min-width:160px;border:2px solid var(--borde);border-radius:12px;
    padding:7px 11px;cursor:pointer;background:#fff;text-align:left;font:inherit;
    transition:border-color .15s, background .15s;

  .chip .titulo{display:block;font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em}
  .chip .coords{display:block;font-size:.84rem;color:var(--gris);margin-top:2px;font-variant-numeric:tabular-nums}
  .chip.fuego .titulo{color:var(--rojo)}
  .chip.zona .titulo{color:var(--azul)}
  .chip.activo{border-style:dashed}
  .chip.fuego.activo{border-color:var(--rojo);background:#fef2f2}
  .chip.zona.activo{border-color:var(--azul);background:#eff6ff}
  #btn-borrar{border:1px solid var(--borde);background:#fff;border-radius:12px;padding:0 14px;cursor:pointer;font:inherit;font-size:.85rem}
  #btn-borrar:hover{background:var(--fondo)}
  #hint{font-size:.8rem;color:var(--gris);width:100%;margin-top:2px}

  #map{flex:1;min-height:260px}

  .marcador.fuego{background:var(--rojo)}
  .marcador.zona{background:var(--azul)}

  #hint-calc{font-size:.82rem;color:var(--gris);flex:1 1 220px;min-width:180px}
  #resumen{
    display:none;align-items:center;gap:8px;flex:1 1 260px;min-width:220px;
    border-radius:12px;padding:8px 12px;cursor:pointer;border:1px solid var(--borde);
    font-size:.9rem;font-weight:700;background:var(--fondo);text-align:left;font-family:inherit;
  }
  #resumen .dot{width:12px;height:12px;border-radius:999px;flex:0 0 auto}
  #resumen.riesgo{background:var(--rojo-suave);border-color:#fecaca;color:#7f1d1d}
  #resumen.riesgo .dot{background:var(--rojo)}
  #resumen.alerta{background:var(--ambar-suave);border-color:#fde68a;color:#78350f}
  #resumen.alerta .dot{background:var(--ambar)}
  #resumen.seguro{background:var(--verde-suave);border-color:#a7f3d0;color:#064e3b}
  #resumen.seguro .dot{background:var(--verde)}
  .btn{border:1px solid var(--borde);background:#fff;border-radius:12px;padding:9px 14px;cursor:pointer;font:inherit;font-size:.88rem}
  .btn:hover{background:var(--fondo)}
  .btn.primario{background:var(--rojo);border-color:var(--rojo);color:#fff;font-weight:800}
  .btn.primario:hover{background:#b91c1c}
  .btn.primario:disabled{background:#e2e8f0;border-color:#e2e8f0;color:#94a3b8;cursor:not-allowed}

  #inputs{display:none;border-top:1px dashed var(--borde);padding:10px 12px}
  #inputs.abierto{display:block}
  .grid-datos{display:grid;grid-template-columns:repeat(auto-fit,minmax(215px,1fr));gap:12px}
  .campo label{display:block;font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--gris);margin-bottom:4px}
  .campo select{width:100%;padding:8px;border:1px solid var(--borde);border-radius:10px;font:inherit;background:#fff}
  .campo .fila-rango{display:flex;align-items:center;gap:10px}
  .campo input[type=range]{flex:1;accent-color:var(--rojo)}
  .campo output{min-width:66px;text-align:right;font-weight:800;font-variant-numeric:tabular-nums}

  .metrica .v{font-size:1.28rem;font-weight:900;margin:2px 0}

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
"use strict";
// === MODELO ALERTA FUEGO (portado 1:1 desde src/modelo.py) ===
// VPIF = V0 · FV · FP ; Tiempo = distancia / VPIF
// No modificar valores sin aviso explícito: modelo documental del grupo.

const DIRECCIONES_GRADOS = {
  N: 0, NE: 45, E: 90, SE: 135, S: 180, SO: 225, O: 270, NO: 315
};

const V0_COMBUSTIBLE = {
  pastos_bajos: 3,
  quercus: 4,
  matorral_mediterraneo: 6,
  pinar: 8
};

function calcularDistanciaM(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const toRad = (g) => g * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat / 2) ** 2 +
    Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function calcularRumboGrados(lat1, lon1, lat2, lon2) {
  const toRad = (g) => g * Math.PI / 180;
  const y = Math.sin(toRad(lon2 - lon1)) * Math.cos(toRad(lat2));
  const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) -
    Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(toRad(lon2 - lon1));
  const rumbo = Math.atan2(y, x) * 180 / Math.PI;
  return (rumbo + 360) % 360;
}

function diferenciaAngularFirmada(a, b) {
  // Diferencia b−a normalizada a [−180, 180]
  let d = (b - a) % 360;
  if (d > 180) d -= 360;
  if (d < -180) d += 360;
  return d;
}

function clasificarCuadrante(direccionVientoGrados, rumboFuegoZonaGrados) {
  const d = diferenciaAngularFirmada(direccionVientoGrados, rumboFuegoZonaGrados);
  const abs = Math.abs(d);
  if (abs <= 45) return { cuadrante: "riesgo", diferencia: d };
  if (abs <= 135) {
    return { cuadrante: d > 0 ? "alerta_derecha" : "alerta_izquierda", diferencia: d };
  }
  return { cuadrante: "sin_riesgo", diferencia: d };
}

function obtenerFactorViento(vKmh) {
  if (vKmh < 10) return 1;
  if (vKmh < 20) return 1.5;
  if (vKmh < 30) return 2;
  return 3;
}

function obtenerFactorPendiente(pendientePct, sentidoLadera) {
  if (sentidoLadera === "bajando") return 0.7;
  if (sentidoLadera === "llano") return 1;
  if (pendientePct < 20) return 1;
  if (pendientePct <= 40) return 1.5;
  return 2;
}

function formatearTiempo(tiempoMin) {
  if (tiempoMin === null || !isFinite(tiempoMin)) return "indeterminado";
  const horas = Math.floor(tiempoMin / 60);
  const minutos = Math.round(tiempoMin % 60);
  if (horas === 0) return `${minutos} min`;
  return `${horas} h ${minutos} min`;
}

function clasificarEscenario(tiempoMin) {
  if (tiempoMin === null || !isFinite(tiempoMin)) return "indeterminado";
  if (tiempoMin <= 30) return "30_min";
  if (tiempoMin <= 60) return "1_hora";
  if (tiempoMin <= 90) return "1_hora_y_media";
  return "vigilancia_preventiva";
}

function evaluarAlertaFuego(p) {
  const distanciaM = calcularDistanciaM(p.latFuego, p.lonFuego, p.latZona, p.lonZona);
  const rumbo = calcularRumboGrados(p.latFuego, p.lonFuego, p.latZona, p.lonZona);
  const dirViento = DIRECCIONES_GRADOS[p.direccionVientoHacia];
  const cls = clasificarCuadrante(dirViento, rumbo);

  const v0 = V0_COMBUSTIBLE[p.tipoCombustible];
  const fv = obtenerFactorViento(p.velocidadVientoKmh);
  const fp = obtenerFactorPendiente(p.pendientePct, p.sentidoLadera);
  const vpif = v0 * fv * fp;

  const tiempoMin = vpif > 0 ? distanciaM / vpif : null;

  return {
    distanciaM,
    rumboFuegoZona: rumbo,
    direccionVientoGrados: dirViento,
    diferenciaFirmada: cls.diferencia,
    cuadrante: cls.cuadrante,
    v0, fv, fp, vpif,
    tiempoMin,
    tiempoTexto: formatearTiempo(tiempoMin),
    escenario: clasificarEscenario(tiempoMin)
  };
}
// === FIN MODELO ===

if (typeof module !== "undefined") {
  module.exports = {
    DIRECCIONES_GRADOS, V0_COMBUSTIBLE,
    calcularDistanciaM, calcularRumboGrados, diferenciaAngularFirmada,
    clasificarCuadrante, obtenerFactorViento, obtenerFactorPendiente,
    formatearTiempo, clasificarEscenario, evaluarAlertaFuego
  };
}
// === GEOMETRÍA DE CUADRANTES ===

function puntoDesdeOrigen(lat, lon, rumboGrados, distanciaM) {
  const R = 6371000;
  const toRad = (g) => g * Math.PI / 180;
  const toDeg = (r) => r * 180 / Math.PI;
  const br = toRad(rumboGrados);
  const la1 = toRad(lat);
  const lo1 = toRad(lon);
  const dR = distanciaM / R;

  const la2 = Math.asin(
    Math.sin(la1) * Math.cos(dR) +
    Math.cos(la1) * Math.sin(dR) * Math.cos(br)
  );
  const lo2 = lo1 + Math.atan2(
    Math.sin(br) * Math.sin(dR) * Math.cos(la1),
    Math.cos(dR) - Math.sin(la1) * Math.sin(la2)
  );
  return [toDeg(la2), toDeg(lo2)];
}

function crearSectorLatLng(lat, lon, direccionCentral, aperturaGrados, radioM, pasos = 28) {
  const ini = direccionCentral - aperturaGrados / 2;
  const fin = direccionCentral + aperturaGrados / 2;
  const puntos = [[lat, lon]];
  for (let i = 0; i <= pasos; i++) {
    const ang = ini + (fin - ini) * i / pasos;
    puntos.push(puntoDesdeOrigen(lat, lon, ang, radioM));
  }
  puntos.push([lat, lon]);
  return puntos;
}
// === FIN GEOMETRÍA ===

if (typeof module !== "undefined") {
  module.exports = { puntoDesdeOrigen, crearSectorLatLng };
}
// === TEXTOS DEL PROTOCOLO (documento Alerta Fuego) ===

const TEXTO_CUADRANTE = {
  riesgo: {
    clase: "riesgo",
    etiqueta: "Exposición principal",
    titulo: "Cuadrante de riesgo",
    desc: "La zona vulnerable está en el cuadrante hacia el que empuja el viento. Es la exposición principal según el modelo."
  },
  alerta_derecha: {
    clase: "alerta",
    etiqueta: "Exposición lateral",
    titulo: "Cuadrante de alerta",
    desc: "La zona vulnerable está en un cuadrante lateral. Un cambio de viento podría dirigir el frente hacia ella: mantén vigilancia."
  },
  alerta_izquierda: {
    clase: "alerta",
    etiqueta: "Exposición lateral",
    titulo: "Cuadrante de alerta",
    desc: "La zona vulnerable está en un cuadrante lateral. Un cambio de viento podría dirigir el frente hacia ella: mantén vigilancia."
  },
  sin_riesgo: {
    clase: "seguro",
    etiqueta: "Exposición baja según viento actual",
    titulo: "Sin riesgo directo",

};

// === ESTADO ===

const CENTRO_TRABAJO = [40.1290, -5.4610];

const estado = {
  fuego: null,
  zona: null,
  objetivo: "fuego",
  resultado: null
};

// === MAPA ===

const map = L.map("map").setView(CENTRO_TRABAJO, 13);

const capaOSM = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19, attribution: "© OpenStreetMap"
});
const capaSat = L.tileLayer(
  "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
  { maxZoom: 19, attribution: "Tiles © Esri — Maxar, Earthstar Geographics" }
);
capaOSM.addTo(map);
L.control.layers({ "Mapa": capaOSM, "Satélite": capaSat }, null, { position: "topright" }).addTo(map);
L.control.scale({ imperial: false }).addTo(map);

function icono(tipo) {
  const emoji = tipo === "fuego" ? "🔥" : "🏠";
  return L.divIcon({
    className: "",
    html: `<div class="marcador ${tipo}">${emoji}</div>`,
    iconSize: [34, 34],
    iconAnchor: [17, 17]
  });
}

const marcadores = { fuego: null, zona: null };
let linea = null;
let capasCalculo = [];   // sectores + flecha de viento

function fijarPunto(tipo, latlng) {
  estado[tipo] = { lat: +latlng.lat.toFixed(6), lon: +latlng.lng.toFixed(6) };

  if (!marcadores[tipo]) {
    marcadores[tipo] = L.marker(latlng, { icon: icono(tipo), draggable: true }).addTo(map);
    marcadores[tipo].on("drag dragend", (e) => {
      const p = e.target.getLatLng();
      estado[tipo] = { lat: +p.lat.toFixed(6), lon: +p.lng.toFixed(6) };
      invalidarResultado();
      refrescar();
    });
  } else {
    marcadores[tipo].setLatLng(latlng);
  }

  if (tipo === "fuego" && !estado.zona) estado.objetivo = "zona";

  invalidarResultado();
  refrescar();
}

map.on("click", (e) => fijarPunto(estado.objetivo, e.latlng));

// === CÁLCULO Y CAPAS DE RESULTADO ===

function limpiarCapasCalculo() {
  for (const c of capasCalculo) map.removeLayer(c);
  capasCalculo = [];
}

function invalidarResultado() {
  if (estado.resultado === null) return;
  estado.resultado = null;
  limpiarCapasCalculo();
  document.getElementById("resultado").classList.remove("abierto");
  document.getElementById("resumen").style.display = "none";
}

function dibujarCuadrantes(r) {
  limpiarCapasCalculo();
  const f = estado.fuego;
  const dir = r.direccionVientoGrados;
  // Radio visual proporcional a la distancia: sin decisiones extra para el usuario.
  const radio = Math.min(12000, Math.max(900, r.distanciaM * 1.15));

  const sectores = [
    ["Cuadrante de riesgo", dir, "#dc2626", 0.28],
    ["Cuadrante de alerta", dir + 90, "#f59e0b", 0.24],
    ["Cuadrante de alerta", dir - 90, "#f59e0b", 0.24],
    ["Cuadrante sin riesgo directo", dir + 180, "#10b981", 0.20]
  ];
  for (const [nombre, d, color, op] of sectores) {
    const pol = L.polygon(crearSectorLatLng(f.lat, f.lon, d, 90, radio), {
      color, weight: 2, fillColor: color, fillOpacity: op
    }).bindTooltip(nombre).addTo(map);
    capasCalculo.push(pol);
  }

  const fin = puntoDesdeOrigen(f.lat, f.lon, dir, radio);
  const flecha = L.polyline([[f.lat, f.lon], fin], { color: "#dc2626", weight: 5 })
    .bindTooltip("Dirección del viento").addTo(map);
  capasCalculo.push(flecha);
}

function leerEntradas() {
  return {
    direccionVientoHacia: document.getElementById("in-dir").value,
    velocidadVientoKmh: +document.getElementById("in-vel").value,
    tipoCombustible: document.getElementById("in-comb").value,
    pendientePct: +document.getElementById("in-pen").value,
    sentidoLadera: document.getElementById("in-sentido").value
  };
}

function calcular() {
  const ent = leerEntradas();
  const r = evaluarAlertaFuego({
    latFuego: estado.fuego.lat, lonFuego: estado.fuego.lon,
    latZona: estado.zona.lat, lonZona: estado.zona.lon,
    ...ent
  });
  estado.resultado = { ...r, entradas: ent };
  dibujarCuadrantes(r);
  pintarResultado();
  document.getElementById("inputs").classList.remove("abierto");
  document.getElementById("resultado").classList.add("abierto");
  refrescar();
}

// === PINTADO DEL RESULTADO ===

const NOMBRE_COMBUSTIBLE = {
  pastos_bajos: "Pastos bajos",
  quercus: "Bosque de Quercus / encinar / robledal",
  matorral_mediterraneo: "Matorral mediterráneo",
  pinar: "Pinar"
};

function formatearMetros(m) {
  return m >= 1000 ? (m / 1000).toFixed(2) + " km" : Math.round(m) + " m";
}

function pintarResultado() {
  const r = estado.resultado;
  const t = TEXTO_CUADRANTE[r.cuadrante];
  const ent = r.entradas;

  // Protocolo: en "sin riesgo directo" se muestra vigilancia preventiva,
  // no el protocolo de tiempos, para no alarmar fuera de la trayectoria principal.
  const escenarioProtocolo = r.cuadrante === "sin_riesgo" ? "vigilancia_preventiva" : r.escenario;
  const p = PROTOCOLOS[escenarioProtocolo];

  let tiempoV, tiempoS;
  if (r.cuadrante === "riesgo") {
    tiempoV = r.tiempoTexto;
    tiempoS = "Estimación principal: la zona está en el cuadrante de riesgo. Úsala para retirarte antes, no para apurar.";
  } else if (r.cuadrante === "sin_riesgo") {
    tiempoV = "No prioritario";
    tiempoS = "No se muestra como alerta principal con la dirección actual del viento.";
  } else {
    tiempoV = r.tiempoTexto;
    tiempoS = "Referencia prudencial por si el frente deriva lateralmente.";
  }

  const acciones = p.acciones.map((a) => `<li>${a}</li>`).join("");

  document.getElementById("resultado").innerHTML = `
    <div class="estado ${t.clase}">
      <div class="etiqueta">${t.etiqueta}</div>
      <div class="titulo">${t.titulo}</div>
      <div class="desc">${t.desc}</div>
    </div>

    <div class="metricas">
      <div class="metrica"><div class="l">Distancia</div><div class="v">${formatearMetros(r.distanciaM)}</div><div class="s">Entre incendio y zona vulnerable.</div></div>
      <div class="metrica"><div class="l">Tiempo estimado</div><div class="v">${tiempoV}</div><div class="s">${tiempoS}</div></div>
      <div class="metrica"><div class="l">VPIF</div><div class="v">${r.vpif.toFixed(1)} m/min</div><div class="s">V0 · FV · FP = ${r.v0} · ${r.fv} · ${r.fp}</div></div>
    </div>

    <div class="datos-usados">
      <b>Datos usados (manuales):</b> viento ${ent.velocidadVientoKmh} km/h hacia ${ent.direccionVientoHacia} ·
      ${NOMBRE_COMBUSTIBLE[ent.tipoCombustible]} · pendiente ${ent.pendientePct} % (${ent.sentidoLadera}).
    </div>

    <details class="bloque" open>
      <summary>${p.encabezado}: ${p.titulo}</summary>
      <ul>${acciones}</ul>
    </details>

    <details class="bloque">
      <summary>Detalles técnicos del cálculo</summary>
      <div class="tec">
        Rumbo incendio → zona: ${r.rumboFuegoZona.toFixed(1)}° ·
        Dirección del viento: ${r.direccionVientoGrados}° ·
        Diferencia angular: ${r.diferenciaFirmada.toFixed(1)}°<br>
        Cuadrante: ${r.cuadrante} · Escenario por tiempo: ${r.escenario}<br>
        VPIF = ${r.v0} · ${r.fv} · ${r.fp} = ${r.vpif.toFixed(2)} m/min ·
        Tiempo = ${Math.round(r.distanciaM)} m / ${r.vpif.toFixed(2)} = ${r.tiempoMin.toFixed(1)} min
      </div>
    </details>

    <div class="recordatorio">
      <strong>Recordatorio:</strong> estimación grosera y orientativa, no un modelo profesional.
      Úsala para anticiparte, retirarte antes y preparar decisiones prudentes; nunca para apurar
      tiempos ni justificar entrar o permanecer en zonas comprometidas. Ante peligro: <strong>112</strong>.
    </div>
  `;

  const resumen = document.getElementById("resumen");
  resumen.className = t.clase;
  resumen.style.display = "flex";
  const tiempoResumen = r.cuadrante === "sin_riesgo" ? "vigilancia" : r.tiempoTexto;
  document.getElementById("resumen-texto").textContent =
    `${t.titulo} · ${tiempoResumen} · ${formatearMetros(r.distanciaM)}`;
}

// === INTERFAZ GENERAL ===

function refrescar() {
  const f = estado.fuego, z = estado.zona;

  document.getElementById("coords-fuego").textContent =
    f ? `${f.lat}, ${f.lon}` : "Sin fijar — toca el mapa";
  document.getElementById("coords-zona").textContent =
    z ? `${z.lat}, ${z.lon}` : "Sin fijar";

  document.getElementById("chip-fuego").classList.toggle("activo", estado.objetivo === "fuego");
  document.getElementById("chip-zona").classList.toggle("activo", estado.objetivo === "zona");

  const nombre = estado.objetivo === "fuego" ? "el <b>incendio</b>" : "la <b>zona vulnerable</b>";
  document.getElementById("hint").innerHTML =
    `El próximo toque en el mapa fija ${nombre}. Arrastra los marcadores para ajustar la posición.`;

  if (linea) { map.removeLayer(linea); linea = null; }
  if (f && z) {
    linea = L.polyline([[f.lat, f.lon], [z.lat, z.lon]], { color: "#eab308", weight: 5 }).addTo(map);
  }

  const listo = Boolean(f && z);
  document.getElementById("btn-calcular").disabled = !listo;
  const hintCalc = document.getElementById("hint-calc");
  if (!listo) {
    hintCalc.textContent = "Fija el incendio y la zona vulnerable en el mapa para poder calcular.";
  } else if (estado.resultado === null) {
    hintCalc.textContent = "Puntos listos. Revisa los datos si lo necesitas y pulsa Calcular alerta.";
  } else {
    hintCalc.textContent = "";
  }
}

document.getElementById("chip-fuego").addEventListener("click", () => {
  estado.objetivo = "fuego"; refrescar();
});
document.getElementById("chip-zona").addEventListener("click", () => {
  estado.objetivo = "zona"; refrescar();
});
document.getElementById("btn-borrar").addEventListener("click", () => {
  for (const t of ["fuego", "zona"]) {
    if (marcadores[t]) { map.removeLayer(marcadores[t]); marcadores[t] = null; }
    estado[t] = null;
  }
  estado.objetivo = "fuego";
  invalidarResultado();
  refrescar();
});

document.getElementById("btn-datos").addEventListener("click", () => {
  document.getElementById("inputs").classList.toggle("abierto");
});
document.getElementById("btn-calcular").addEventListener("click", calcular);
document.getElementById("resumen").addEventListener("click", () => {
  document.getElementById("resultado").classList.toggle("abierto");
});

// Cualquier cambio de datos invalida el resultado anterior.
for (const id of ["in-dir", "in-vel", "in-comb", "in-pen", "in-sentido"]) {
  document.getElementById(id).addEventListener("input", () => {
    invalidarResultado(); refrescar();
  });
}
document.getElementById("in-vel").addEventListener("input", (e) => {
  document.getElementById("out-vel").textContent = e.target.value + " km/h";
});
document.getElementById("in-pen").addEventListener("input", (e) => {
  document.getElementById("out-pen").textContent = e.target.value + " %";
});

refrescar();
</script>
</body>
</html>
