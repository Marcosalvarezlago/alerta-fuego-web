<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Alerta Fuego — demo experimental</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root{
    --rojo:#dc2626; --rojo-suave:#fee2e2;
    --azul:#2563eb;
    --ambar:#f59e0b; --ambar-suave:#fef3c7;
    --verde:#10b981; --verde-suave:#d1fae5;
    --tinta:#0f172a; --gris:#64748b; --borde:#e2e8f0; --fondo:#f8fafc;
  }
  *{box-sizing:border-box}
  [hidden]{display:none !important}
  html,body{height:100%;margin:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    color:var(--tinta);background:var(--fondo);
  }
  #app{display:flex;flex-direction:column;height:100%}

  header{
    background:#111827;color:#fff;padding:10px 14px;
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  }
  header h1{font-size:1.05rem;margin:0;font-weight:800}
  header .tag{
    font-size:.68rem;letter-spacing:.09em;text-transform:uppercase;
    background:#7f1d1d;padding:3px 9px;border-radius:999px;font-weight:700;
  }
  header .aviso{font-size:.78rem;opacity:.9;margin-left:auto}
  header .aviso strong{color:#fed7aa}

  #controles{
    background:#fff;border-bottom:1px solid var(--borde);
    padding:8px 10px;display:flex;gap:8px;align-items:stretch;flex-wrap:wrap;
  }
  .chip{
    flex:1 1 160px;min-width:160px;border:2px solid var(--borde);border-radius:12px;
    padding:7px 11px;cursor:pointer;background:#fff;text-align:left;font:inherit;
    transition:border-color .15s, background .15s;
  }
  .chip .titulo{display:block;font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em}
  .chip .coords{display:block;font-size:.84rem;color:var(--gris);margin-top:2px;font-variant-numeric:tabular-nums}
  .chip.fuego .titulo{color:var(--rojo)}
  .chip.zona .titulo{color:var(--azul)}
  .chip.activo{border-style:dashed}
  .chip.fuego.activo{border-color:var(--rojo);background:#fef2f2}
  .chip.zona.activo{border-color:var(--azul);background:#eff6ff}
  .chip .titulo{display:flex;align-items:center;gap:6px}
  .editar{
    border:none;background:transparent;cursor:pointer;padding:2px 6px;
    font-size:1rem;color:var(--gris);line-height:1;min-width:28px;min-height:24px;
  }
  .editar:hover{color:var(--tinta)}
  #editor{width:100%;display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:2px 0}
  #editor[hidden]{display:none}
  #editor-titulo{font-size:.8rem;font-weight:800}
  #editor-input{
    flex:1 1 220px;min-width:180px;padding:8px;border:1px solid var(--borde);
    border-radius:10px;font:inherit;font-size:16px;font-variant-numeric:tabular-nums;
  }
  #editor-msg{font-size:.78rem;color:#b91c1c;width:100%}
  #btn-borrar,#btn-geo{border:1px solid var(--borde);background:#fff;border-radius:12px;padding:0 14px;cursor:pointer;font:inherit;font-size:.85rem}
  #btn-borrar:hover,#btn-geo:hover{background:var(--fondo)}
  #hint{font-size:.8rem;color:var(--gris);width:100%;margin-top:2px}

  #map{flex:1;min-height:260px}

  .marcador{
    display:flex;align-items:center;justify-content:center;
    width:34px;height:34px;border-radius:50%;font-size:17px;
    border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.35);
  }
  .marcador.fuego{background:var(--rojo)}
  .marcador.zona{background:var(--azul)}

  /* ------- Panel inferior: datos, cálculo y resultado ------- */
  #panel{background:#fff;border-top:1px solid var(--borde);box-shadow:0 -6px 18px rgba(15,23,42,.06)}
  #barra{display:flex;gap:8px;align-items:center;padding:8px 10px;flex-wrap:wrap}
  #hint-calc{font-size:.82rem;color:var(--gris);flex:1 1 220px;min-width:180px}
  #resumen{
    display:none;align-items:center;gap:8px;flex:1 1 260px;min-width:220px;
    border-radius:12px;padding:8px 12px;cursor:pointer;border:1px solid var(--borde);
    font-size:.9rem;font-weight:700;background:var(--fondo);text-align:left;font-family:inherit;
  }
  #resumen .dot{width:12px;height:12px;border-radius:999px;flex:0 0 auto}
  #resumen.riesgo{background:var(--rojo-suave);border-color:#fecaca;color:#7f1d1d}
  #resumen.riesgo .dot{background:var(--rojo)}
  #resumen.alerta{background:var(--ambar-suave);border-color:#fde68a;color:#78350f}
  #resumen.alerta .dot{background:var(--ambar)}
  #resumen.seguro{background:var(--verde-suave);border-color:#a7f3d0;color:#064e3b}
  #resumen.seguro .dot{background:var(--verde)}
  .btn{border:1px solid var(--borde);background:#fff;border-radius:12px;padding:9px 14px;cursor:pointer;font:inherit;font-size:.88rem}
  .btn:hover{background:var(--fondo)}
  .btn.primario{background:var(--rojo);border-color:var(--rojo);color:#fff;font-weight:800}
  .btn.primario:hover{background:#b91c1c}
  .btn.primario:disabled{background:#e2e8f0;border-color:#e2e8f0;color:#94a3b8;cursor:not-allowed}

  #inputs{display:none;border-top:1px dashed var(--borde);padding:10px 12px}
  #inputs.abierto{display:block}
  .contenedor-secciones{display:grid;grid-template-columns:repeat(auto-fit,minmax(255px,1fr));gap:16px}
  .seccion-datos .grid-datos{grid-template-columns:1fr}
  .seccion-datos{margin-bottom:12px}
  .cab-seccion{
    display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;
    font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;
    color:var(--gris);margin-bottom:6px;
  }
  .sw{
    display:flex;align-items:center;gap:6px;cursor:pointer;
    font-size:.8rem;font-weight:600;text-transform:none;letter-spacing:0;color:var(--tinta);
  }
  .sw input{accent-color:var(--rojo);width:16px;height:16px}
  .auto-card{
    border:1px solid var(--borde);border-radius:12px;padding:10px 12px;
    background:var(--fondo);font-size:.86rem;line-height:1.5;
  }
  .auto-card .err{color:#b91c1c;font-weight:600}
  .auto-card .mini-nota{color:var(--gris);font-size:.78rem;margin-top:4px}
  .btn.mini{padding:5px 10px;font-size:.78rem;border-radius:9px;margin-top:6px}
  .grid-datos{display:grid;grid-template-columns:repeat(auto-fit,minmax(215px,1fr));gap:12px}
  .campo label{display:block;font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--gris);margin-bottom:4px}
  .campo select{width:100%;padding:8px;border:1px solid var(--borde);border-radius:10px;font:inherit;background:#fff}
  .campo .fila-rango{display:flex;align-items:center;gap:10px}
  .campo input[type=range]{flex:1;accent-color:var(--rojo)}
  .campo output{min-width:66px;text-align:right;font-weight:800;font-variant-numeric:tabular-nums}
  .fila-rango.sin-elegir{opacity:.45}
  .fila-rango.sin-elegir input[type=range]{accent-color:#94a3b8}
  .fila-rango.sin-elegir output{font-weight:600;color:var(--gris);font-style:italic}

  .toast{
    position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
    background:#111827;color:#fff;padding:9px 16px;border-radius:999px;
    font-size:.85rem;box-shadow:0 8px 24px rgba(0,0,0,.3);z-index:2000;
    opacity:0;pointer-events:none;transition:opacity .25s;max-width:92vw;text-align:center;
  }
  .toast.on{opacity:.96}

  #resultado{display:none;border-top:1px solid var(--borde);padding:12px;max-height:48vh;overflow-y:auto}
  #resultado.abierto{display:block}
  .estado{border-radius:16px;padding:14px 16px;border:1px solid;margin-bottom:10px}
  .estado .etiqueta{font-size:.72rem;font-weight:850;letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px}
  .estado .titulo{font-size:1.35rem;font-weight:900;line-height:1.15;margin-bottom:4px}
  .estado .desc{font-size:.92rem;line-height:1.45}
  .estado.riesgo{background:var(--rojo-suave);border-color:#fecaca;color:#7f1d1d}
  .estado.alerta{background:var(--ambar-suave);border-color:#fde68a;color:#78350f}
  .estado.seguro{background:var(--verde-suave);border-color:#a7f3d0;color:#064e3b}
  .metricas{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:10px}
  .metrica{border:1px solid var(--borde);border-radius:14px;padding:10px 12px;background:#fff}
  .metrica .l{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--gris)}
  .metrica .v{font-size:1.28rem;font-weight:900;margin:2px 0}
  .metrica .s{font-size:.78rem;color:var(--gris);line-height:1.3}
  .datos-usados{font-size:.84rem;color:#334155;background:var(--fondo);border:1px solid var(--borde);border-radius:12px;padding:9px 12px;margin-bottom:10px}
  details.bloque{border:1px solid var(--borde);border-radius:12px;padding:9px 12px;margin-bottom:10px;background:#fff}
  details.bloque summary{cursor:pointer;font-weight:800;font-size:.9rem}
  details.bloque ul{margin:8px 0 2px;padding-left:20px}
  details.bloque li{font-size:.88rem;line-height:1.45;margin-bottom:5px}
  details.bloque .tec{font-size:.84rem;color:#334155;line-height:1.6;margin-top:8px}
  .recordatorio{border-radius:12px;padding:11px 13px;background:#111827;color:#f8fafc;font-size:.84rem;line-height:1.45}
  .recordatorio strong{color:#fed7aa}

  @media (max-width:480px){
    header .aviso{margin-left:0;width:100%}
    #resultado{max-height:52vh}
    #barra .btn.primario{flex:1 1 100%;order:9;padding:12px}
    .campo select{font-size:16px}
    .chip{min-width:140px;flex-basis:140px}
  }
</style>
</head>
<body>
<div id="app">

  <header>
    <h1>🔥 Alerta Fuego</h1>
    <span class="tag">Demo experimental</span>
    <span class="aviso">No sustituye a emergencias: ante peligro llama al <strong>112</strong>.</span>
  </header>

  <div id="controles">
    <div class="chip fuego activo" id="chip-fuego" role="button" tabindex="0">
      <span class="titulo">🔥 Incendio <button class="editar" id="editar-fuego" type="button" title="Escribir coordenadas a mano">✎</button></span>
      <span class="coords" id="coords-fuego">Sin fijar — toca el mapa</span>
    </div>
    <div class="chip zona" id="chip-zona" role="button" tabindex="0">
      <span class="titulo">🏠 Zona vulnerable <button class="editar" id="editar-zona" type="button" title="Escribir coordenadas a mano">✎</button></span>
      <span class="coords" id="coords-zona">Sin fijar</span>
    </div>
    <button id="btn-geo" type="button" title="Fijar la zona vulnerable en tu posición actual">📍 Mi ubicación</button>
    <button id="btn-borrar" type="button">Borrar puntos</button>
    <div id="editor" hidden>
      <span id="editor-titulo"></span>
      <input id="editor-input" type="text" inputmode="text" placeholder="40.1290, -5.4610 o enlace de Google Maps" autocomplete="off">
      <button class="btn mini" id="editor-aplicar" type="button">Aplicar</button>
      <button class="btn mini" id="editor-cancelar" type="button">Cancelar</button>
      <span id="editor-msg"></span>
    </div>
    <div id="hint"></div>
  </div>

  <div id="map"></div>

  <div id="panel">
    <div id="barra">
      <button id="resumen" type="button" title="Ver / ocultar el detalle del resultado">
        <span class="dot"></span><span id="resumen-texto"></span>
      </button>
      <span id="hint-calc"></span>
      <button class="btn" id="btn-datos" type="button">Datos ▾</button>
      <button class="btn primario" id="btn-calcular" type="button">Calcular alerta</button>
    </div>

    <div id="inputs">
      <div class="contenedor-secciones">

        <div class="seccion-datos">
          <div class="cab-seccion">
            <span>Pendiente</span>
            <label class="sw"><input type="checkbox" id="chk-pen-auto"> Automática</label>
          </div>
          <div id="pen-manual" class="grid-datos">
            <div class="campo">
              <label for="in-pen">Pendiente aproximada</label>
              <div class="fila-rango sin-elegir" id="wrap-pen">
                <input type="range" id="in-pen" min="0" max="100" step="1" value="30">
                <output id="out-pen">sin elegir</output>
              </div>
            </div>
            <div class="campo">
              <label for="in-sentido">El fuego avanza por la ladera</label>
              <select id="in-sentido">
                <option value="" selected>Selecciona…</option>
                <option value="subiendo">Subiendo la ladera</option>
                <option value="llano">En llano</option>
                <option value="bajando">Bajando la ladera</option>
              </select>
            </div>
          </div>
          <div id="pen-auto" class="auto-card" hidden></div>
        </div>

        <div class="seccion-datos">
          <div class="cab-seccion">
            <span>Viento</span>
            <label class="sw"><input type="checkbox" id="chk-viento-auto"> Automático</label>
          </div>
          <div id="viento-manual" class="grid-datos">
            <div class="campo">
              <label for="in-dir">Dirección hacia la que empuja</label>
              <select id="in-dir">
                <option value="" selected>Selecciona…</option>
                <option value="N">Hacia el norte ↑</option>
                <option value="NE">Hacia el nordeste ↗</option>
                <option value="E">Hacia el este →</option>
                <option value="SE">Hacia el sudeste ↘</option>
                <option value="S">Hacia el sur ↓</option>
                <option value="SO">Hacia el suroeste ↙</option>
                <option value="O">Hacia el oeste ←</option>
                <option value="NO">Hacia el noroeste ↖</option>
              </select>
            </div>
            <div class="campo">
              <label for="in-vel">Velocidad</label>
              <div class="fila-rango sin-elegir" id="wrap-vel">
                <input type="range" id="in-vel" min="0" max="80" step="1" value="20">
                <output id="out-vel">sin elegir</output>
              </div>
            </div>
          </div>
          <div id="viento-auto" class="auto-card" hidden></div>
        </div>

        <div class="seccion-datos">
          <div class="cab-seccion"><span>Combustible</span></div>
          <div class="grid-datos">
            <div class="campo">
              <label for="in-comb">Tipo dominante</label>
              <select id="in-comb">
                <option value="" selected>Selecciona…</option>
                <option value="pastos_bajos">Pastos bajos</option>
                <option value="quercus">Bosque de quercus / encinar / robledal</option>
                <option value="matorral_mediterraneo">Matorral mediterráneo</option>
                <option value="pinar">Pinar</option>
              </select>
            </div>
          </div>
        </div>

      </div>
    </div>

    <div id="resultado"></div>
  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// =====================================================================
// CONFIGURACIÓN OPCIONAL — servicio resolvedor de enlaces cortos
// Pega entre las comillas la URL de tu Cloudflare Worker para que
// funcionen los enlaces cortos de Google Maps (maps.app.goo.gl).
// Ejemplo: window.CONFIG_RESOLVER = "https://alerta-fuego-enlaces.tuusuario.workers.dev";
// Si se deja vacío, la app funciona igual pero pedirá la URL completa.
// =====================================================================
window.CONFIG_RESOLVER = "https://alerta-fuego-enlaces.marcosalvarez1w.workers.dev";
</script>
<script>
"use strict";
// === MODELO ALERTA FUEGO (portado 1:1 desde src/modelo.py) ===
// VPIF = V0 · FV · FP ; Tiempo = distancia / VPIF
// No modificar valores sin aviso explícito: modelo documental del grupo.

const DIRECCIONES_GRADOS = {
  N: 0, NE: 45, E: 90, SE: 135, S: 180, SO: 225, O: 270, NO: 315
};

const V0_COMBUSTIBLE = {
  pastos_bajos: 3,
  quercus: 4,
  matorral_mediterraneo: 6,
  pinar: 8
};

function calcularDistanciaM(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const toRad = (g) => g * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat / 2) ** 2 +
    Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function calcularRumboGrados(lat1, lon1, lat2, lon2) {
  const toRad = (g) => g * Math.PI / 180;
  const y = Math.sin(toRad(lon2 - lon1)) * Math.cos(toRad(lat2));
  const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) -
    Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(toRad(lon2 - lon1));
  const rumbo = Math.atan2(y, x) * 180 / Math.PI;
  return (rumbo + 360) % 360;
}

function diferenciaAngularFirmada(a, b) {
  // Diferencia b−a normalizada a [−180, 180]
  let d = (b - a) % 360;
  if (d > 180) d -= 360;
  if (d < -180) d += 360;
  return d;
}

function clasificarCuadrante(direccionVientoGrados, rumboFuegoZonaGrados) {
  const d = diferenciaAngularFirmada(direccionVientoGrados, rumboFuegoZonaGrados);
  const abs = Math.abs(d);
  if (abs <= 45) return { cuadrante: "riesgo", diferencia: d };
  if (abs <= 135) {
    return { cuadrante: d > 0 ? "alerta_derecha" : "alerta_izquierda", diferencia: d };
  }
  return { cuadrante: "sin_riesgo", diferencia: d };
}

function obtenerFactorViento(vKmh) {
  if (vKmh < 10) return 1;
  if (vKmh < 20) return 1.5;
  if (vKmh < 30) return 2;
  return 3;
}

function obtenerFactorPendiente(pendientePct, sentidoLadera) {
  if (sentidoLadera === "bajando") return 0.7;
  if (sentidoLadera === "llano") return 1;
  if (pendientePct < 20) return 1;
  if (pendientePct <= 40) return 1.5;
  return 2;
}

function formatearTiempo(tiempoMin) {
  if (tiempoMin === null || !isFinite(tiempoMin)) return "indeterminado";
  const horas = Math.floor(tiempoMin / 60);
  const minutos = Math.round(tiempoMin % 60);
  if (horas === 0) return `${minutos} min`;
  return `${horas} h ${minutos} min`;
}

function clasificarEscenario(tiempoMin) {
  if (tiempoMin === null || !isFinite(tiempoMin)) return "indeterminado";
  if (tiempoMin <= 30) return "30_min";
  if (tiempoMin <= 60) return "1_hora";
  if (tiempoMin <= 90) return "1_hora_y_media";
  return "vigilancia_preventiva";
}

function evaluarAlertaFuego(p) {
  const distanciaM = calcularDistanciaM(p.latFuego, p.lonFuego, p.latZona, p.lonZona);
  const rumbo = calcularRumboGrados(p.latFuego, p.lonFuego, p.latZona, p.lonZona);
  const dirViento = DIRECCIONES_GRADOS[p.direccionVientoHacia];
  const cls = clasificarCuadrante(dirViento, rumbo);

  const v0 = V0_COMBUSTIBLE[p.tipoCombustible];
  const fv = obtenerFactorViento(p.velocidadVientoKmh);
  const fp = obtenerFactorPendiente(p.pendientePct, p.sentidoLadera);
  const vpif = v0 * fv * fp;

  const tiempoMin = vpif > 0 ? distanciaM / vpif : null;

  return {
    distanciaM,
    rumboFuegoZona: rumbo,
    direccionVientoGrados: dirViento,
    diferenciaFirmada: cls.diferencia,
    cuadrante: cls.cuadrante,
    v0, fv, fp, vpif,
    tiempoMin,
    tiempoTexto: formatearTiempo(tiempoMin),
    escenario: clasificarEscenario(tiempoMin)
  };
}
// === FIN MODELO ===

if (typeof module !== "undefined") {
  module.exports = {
    DIRECCIONES_GRADOS, V0_COMBUSTIBLE,
    calcularDistanciaM, calcularRumboGrados, diferenciaAngularFirmada,
    clasificarCuadrante, obtenerFactorViento, obtenerFactorPendiente,
    formatearTiempo, clasificarEscenario, evaluarAlertaFuego
  };
}
// === GEOMETRÍA DE CUADRANTES ===

function puntoDesdeOrigen(lat, lon, rumboGrados, distanciaM) {
  const R = 6371000;
  const toRad = (g) => g * Math.PI / 180;
  const toDeg = (r) => r * 180 / Math.PI;
  const br = toRad(rumboGrados);
  const la1 = toRad(lat);
  const lo1 = toRad(lon);
  const dR = distanciaM / R;

  const la2 = Math.asin(
    Math.sin(la1) * Math.cos(dR) +
    Math.cos(la1) * Math.sin(dR) * Math.cos(br)
  );
  const lo2 = lo1 + Math.atan2(
    Math.sin(br) * Math.sin(dR) * Math.cos(la1),
    Math.cos(dR) - Math.sin(la1) * Math.sin(la2)
  );
  return [toDeg(la2), toDeg(lo2)];
}

function crearSectorLatLng(lat, lon, direccionCentral, aperturaGrados, radioM, pasos = 28) {
  const ini = direccionCentral - aperturaGrados / 2;
  const fin = direccionCentral + aperturaGrados / 2;
  const puntos = [[lat, lon]];
  for (let i = 0; i <= pasos; i++) {
    const ang = ini + (fin - ini) * i / pasos;
    puntos.push(puntoDesdeOrigen(lat, lon, ang, radioM));
  }
  puntos.push([lat, lon]);
  return puntos;
}
// === FIN GEOMETRÍA ===

if (typeof module !== "undefined") {

// === CONVERSIONES METEO Y TERRENO (puras, verificadas) ===

const CARDINALES = ["N", "NE", "E", "SE", "S", "SO", "O", "NO"];

// La API meteorológica da la dirección DESDE la que sopla el viento.
// El modelo usa la dirección HACIA la que empuja el fuego: +180°.
function direccionHaciaDesdeMeteo(desdeGrados) {
  return (desdeGrados + 180) % 360;
}

function gradosACardinal(grados) {
  const g = ((grados % 360) + 360) % 360;
  return CARDINALES[Math.round(g / 45) % 8];
}

// Pendiente provisional entre los dos puntos extremos.
// Umbral de 5 m de desnivel para considerar "llano" (criterio original).
function calcularPendienteDesdeElevaciones(elevFuegoM, elevZonaM, distanciaM, umbralLlanoM = 5) {
  const desnivelM = elevZonaM - elevFuegoM;
  let pendientePct = distanciaM > 0 ? Math.abs(desnivelM) / distanciaM * 100 : 0;
  pendientePct = Math.max(0, Math.min(100, pendientePct));
  const sentidoLadera =
    Math.abs(desnivelM) < umbralLlanoM ? "llano" : (desnivelM > 0 ? "subiendo" : "bajando");
  return { desnivelM, pendientePct, sentidoLadera };
}
// === FIN CONVERSIONES ===

if (typeof module !== "undefined") {
  module.exports = { CARDINALES, direccionHaciaDesdeMeteo, gradosACardinal, calcularPendienteDesdeElevaciones };
}
// === PARSER DE UBICACIONES: coordenadas y enlaces de mapas ===
// Devuelve {ok:true, lat, lon} o {ok:false, motivo} con motivo:
//  "enlace_corto" (maps.app.goo.gl sin coordenadas),
//  "utm" (enlace IGN antiguo con coordenadas UTM),
//  "formato" (no se reconoce nada).
// Evita el fallo típico de tomar zoom, fechas o ids como coordenadas:
// en URLs solo se aceptan patrones fuertes.

function latLonValidos(lat, lon) {
  return lat >= -90 && lat <= 90 && lon >= -180 && lon <= 180;
}

// Conversión Web Mercator (EPSG:3857, metros) -> WGS84 grados.
function mercatorAWgs84(x, y) {
  const R = 6378137;
  const lon = x / R * 180 / Math.PI;
  const lat = (2 * Math.atan(Math.exp(y / R)) - Math.PI / 2) * 180 / Math.PI;
  return { lat, lon };
}

function parsearUbicacion(texto) {
  if (!texto) return { ok: false, motivo: "formato" };
  let t = String(texto).trim();
  try { t = decodeURIComponent(t); } catch (e) { /* texto con % suelto: seguir tal cual */ }

  const esUrl = /https?:\/\//.test(t);
  const NUM = "(-?\\d+(?:\\.\\d+)?)";

  if (esUrl) {
    // 0) Página /sorry (CAPTCHA de Google): la coordenada viaja dentro de continue=
    const cont = t.match(/[?&]continue=([^&]+)/);
    if (cont) {
      let interno = cont[1];
      try { interno = decodeURIComponent(interno); } catch (e) { /* seguir */ }
      const r = parsearUbicacion(interno);
      if (r.ok) return r;
    }

    // 0b) Google Maps: /maps/search/lat,lon  o  /search/?query=lat,lon
    let ms = t.match(new RegExp("/maps/search/" + NUM + "\\s*,\\s*\\+?\\s*" + NUM));
    if (ms) {
      const lat = parseFloat(ms[1]), lon = parseFloat(ms[2]);
      if (latLonValidos(lat, lon)) return { ok: true, lat, lon };
    }

    // 1) Google Maps: @lat,lon
    let m = t.match(new RegExp("@\\s*" + NUM + "\\s*,\\s*" + NUM));
    if (m) {
      const lat = parseFloat(m[1]), lon = parseFloat(m[2]);
      if (latLonValidos(lat, lon)) return { ok: true, lat, lon };
    }
    // 2) Google Maps: !3dLAT!4dLON
    m = t.match(new RegExp("!3d" + NUM + "!4d" + NUM));
    if (m) {
      const lat = parseFloat(m[1]), lon = parseFloat(m[2]);
      if (latLonValidos(lat, lon)) return { ok: true, lat, lon };
    }
    // 3) Google Maps: !2dLON!3dLAT
    m = t.match(new RegExp("!2d" + NUM + "!3d" + NUM));
    if (m) {
      const lon = parseFloat(m[1]), lat = parseFloat(m[2]);
      if (latLonValidos(lat, lon)) return { ok: true, lat, lon };
    }
    // 4) Parámetros de consulta: q, ll, query, center, destination, origin, daddr, saddr
    const CLAVES = ["q", "ll", "query", "center", "destination", "origin", "daddr", "saddr"];
    for (const clave of CLAVES) {
      const re = new RegExp("[?&#]" + clave + "=" + NUM + "\\s*,\\s*" + NUM);
      const p = t.match(re);
      if (p) {
        const a = parseFloat(p[1]), b = parseFloat(p[2]);
        if (latLonValidos(a, b)) return { ok: true, lat: a, lon: b };
        // Valores enormes: coordenadas Web Mercator (visores tipo Iberpix moderno)
        if (Math.abs(a) > 180 || Math.abs(b) > 90) {
          const c = mercatorAWgs84(a, b);
          if (latLonValidos(c.lat, c.lon)) {
            return { ok: true, lat: +c.lat.toFixed(6), lon: +c.lon.toFixed(6) };
          }
        }
      }
    }
    // 5) Enlace IGN antiguo con UTM: x=...&y=...&srid=258xx
    if (/[?&]x=-?\d/.test(t) && /[?&]y=-?\d/.test(t) && /srid=258\d\d/.test(t)) {
      return { ok: false, motivo: "utm" };
    }
    // 6) Enlace corto de Google sin coordenadas en la URL
    if (/maps\.app\.goo\.gl|goo\.gl\/maps/.test(t)) {
      return { ok: false, motivo: "enlace_corto" };
    }
    return { ok: false, motivo: "formato" };
  }

  // Texto simple: "lat, lon" con coma, punto y coma o espacios (decimales con punto)
  const m = t.match(new RegExp("^" + NUM + "[\\s,;]+" + NUM + "$"));
  if (m) {
    const lat = parseFloat(m[1]), lon = parseFloat(m[2]);
    if (latLonValidos(lat, lon)) return { ok: true, lat, lon };
  }
  return { ok: false, motivo: "formato" };
}
// === FIN PARSER ===

if (typeof module !== "undefined") {
  module.exports = { parsearUbicacion, mercatorAWgs84 };
}

function horaActualTexto() {
  return new Date().toLocaleTimeString("es-ES", { hour: "2-digit", minute: "2-digit" });
}

async function fetchJson(url, timeoutMs = 7000) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), timeoutMs);
  try {
    const r = await fetch(url, { signal: ctrl.signal });
    if (!r.ok) throw new Error("HTTP " + r.status);
    return await r.json();
  } finally {
    clearTimeout(t);
  }
}

const cacheViento = new Map();
function claveViento(lat, lon) { return lat.toFixed(3) + "," + lon.toFixed(3); }

async function obtenerVientoCacheado(lat, lon, forzar = false) {
  const clave = claveViento(lat, lon);
  const ahora = Date.now();
  const e = cacheViento.get(clave);
  if (!forzar && e && ahora - e.t < MINUTOS_CACHE_VIENTO * 60000) return e.d;

  const url = "https://api.open-meteo.com/v1/forecast?latitude=" + lat +
    "&longitude=" + lon + "&current=wind_speed_10m,wind_direction_10m&timezone=auto";
  const j = await fetchJson(url);
  const c = j.current;
  if (!c || typeof c.wind_speed_10m !== "number" || typeof c.wind_direction_10m !== "number") {
    throw new Error("Respuesta sin datos de viento");
  }
  const hacia = direccionHaciaDesdeMeteo(c.wind_direction_10m);
  const d = {
    velocidadKmh: c.wind_speed_10m,
    desdeGrados: c.wind_direction_10m,
    haciaGrados: hacia,
    haciaCardinal: gradosACardinal(hacia),
    horaConsulta: horaActualTexto()
  };
  cacheViento.set(clave, { t: ahora, d });
  return d;
}

const cachePendiente = new Map();
function clavePendiente(f, z) {
  return [f.lat.toFixed(4), f.lon.toFixed(4), z.lat.toFixed(4), z.lon.toFixed(4)].join(",");
}

async function obtenerPendienteCacheada(f, z) {
  const clave = clavePendiente(f, z);
  const e = cachePendiente.get(clave); // la elevación del terreno no caduca
  if (e) return e;

  const url = "https://api.open-meteo.com/v1/elevation?latitude=" + f.lat + "," + z.lat +
    "&longitude=" + f.lon + "," + z.lon;
  const j = await fetchJson(url);
  if (!j.elevation || j.elevation.length !== 2) throw new Error("Respuesta sin elevaciones");

  const elevF = j.elevation[0], elevZ = j.elevation[1];
  const distanciaM = calcularDistanciaM(f.lat, f.lon, z.lat, z.lon);
  const p = calcularPendienteDesdeElevaciones(elevF, elevZ, distanciaM);
  const d = {
    desnivelM: p.desnivelM,
    pendientePct: p.pendientePct,
    sentidoLadera: p.sentidoLadera,
    elevFuegoM: elevF,
    elevZonaM: elevZ,
    distanciaM: distanciaM,
    fuente: "Open-Meteo elevación (provisional)"
  };
  cachePendiente.set(clave, d);
  return d;
}

// === ACTUALIZACIÓN DE DATOS AUTOMÁTICOS (con protección contra respuestas tardías) ===

let tokenViento = 0;
async function actualizarVientoAuto(forzar = false) {
  const va = estado.vientoAuto;
  if (!va.activo) { renderVientoAuto(); refrescar(); return; }

  if (!estado.fuego) {
    va.datos = null; va.error = null; va.cargando = false;
    renderVientoAuto(); refrescar(); return;
  }

  const token = ++tokenViento;
  va.cargando = true; va.error = null;
  renderVientoAuto(); refrescar();
  try {
    const d = await obtenerVientoCacheado(estado.fuego.lat, estado.fuego.lon, forzar);
    if (token !== tokenViento) return; // llegó tarde: hay una consulta más reciente
    va.datos = d; va.error = null;
  } catch (err) {
    if (token !== tokenViento) return;
    va.datos = null;
    va.error = "No se pudo obtener el viento (" +
      (err && err.name === "AbortError" ? "tiempo agotado" : err.message) + ").";
  }
  va.cargando = false;
  renderVientoAuto(); refrescar();
}

let tokenPen = 0;
async function actualizarPendienteAuto() {
  const pa = estado.penAuto;
  if (!pa.activo) { renderPendienteAuto(); refrescar(); return; }

  if (!estado.fuego || !estado.zona) {
    pa.datos = null; pa.error = null; pa.cargando = false;
    renderPendienteAuto(); refrescar(); return;
  }

  const token = ++tokenPen;
  pa.cargando = true; pa.error = null;
  renderPendienteAuto(); refrescar();
  try {
    const d = await obtenerPendienteCacheada(estado.fuego, estado.zona);
    if (token !== tokenPen) return;
    pa.datos = d; pa.error = null;
  } catch (err) {
    if (token !== tokenPen) return;
    pa.datos = null;
    pa.error = "No se pudo obtener la elevación (" +
      (err && err.name === "AbortError" ? "tiempo agotado" : err.message) + ").";
  }
  pa.cargando = false;
  renderPendienteAuto(); refrescar();
}

function fijarPunto(tipo, latlng) {
  estado[tipo] = { lat: +latlng.lat.toFixed(6), lon: +latlng.lng.toFixed(6) };

  if (!marcadores[tipo]) {
    marcadores[tipo] = L.marker(latlng, { icon: icono(tipo), draggable: true }).addTo(map);
    marcadores[tipo].on("drag", (e) => {
      const p = e.target.getLatLng();
      estado[tipo] = { lat: +p.lat.toFixed(6), lon: +p.lng.toFixed(6) };
      invalidarResultado();
      refrescar();
    });
    marcadores[tipo].on("dragend", () => alCambiarPunto(tipo));
  } else {
    marcadores[tipo].setLatLng(latlng);
  }

  if (tipo === "fuego" && !estado.zona) estado.objetivo = "zona";

  alCambiarPunto(tipo);
}

map.on("click", (e) => fijarPunto(estado.objetivo, e.latlng));

// === CÁLCULO Y CAPAS DE RESULTADO ===

function limpiarCapasCalculo() {
  for (const c of capasCalculo) map.removeLayer(c);
  capasCalculo = [];
}

function invalidarResultado() {
  if (estado.resultado === null) return;
  estado.resultado = null;
  limpiarCapasCalculo();
  document.getElementById("resultado").classList.remove("abierto");
  document.getElementById("resumen").style.display = "none";
}

function dibujarCuadrantes(r) {
  limpiarCapasCalculo();
  const f = estado.fuego;
  const dir = r.direccionVientoGrados;
  const radio = Math.min(12000, Math.max(900, r.distanciaM * 1.15));

  const sectores = [
    ["Cuadrante de riesgo", dir, "#dc2626", 0.28],
    ["Cuadrante de alerta", dir + 90, "#f59e0b", 0.24],
    ["Cuadrante de alerta", dir - 90, "#f59e0b", 0.24],
    ["Cuadrante sin riesgo directo", dir + 180, "#10b981", 0.20]
  ];
  for (const s of sectores) {
    const pol = L.polygon(crearSectorLatLng(f.lat, f.lon, s[1], 90, radio), {
      color: s[2], weight: 2, fillColor: s[2], fillOpacity: s[3]
    }).bindTooltip(s[0]).addTo(map);
    capasCalculo.push(pol);
  }

  const fin = puntoDesdeOrigen(f.lat, f.lon, dir, radio);
  const flecha = L.polyline([[f.lat, f.lon], fin], { color: "#dc2626", weight: 5 })
    .bindTooltip("Dirección del viento").addTo(map);
  capasCalculo.push(flecha);
}

function leerEntradas() {
  const va = estado.vientoAuto, pa = estado.penAuto;

  const viento = va.activo
    ? {
        direccionVientoHacia: va.datos.haciaCardinal,
        velocidadVientoKmh: Math.round(va.datos.velocidadKmh),
        fuenteViento: "Open-Meteo, " + va.datos.horaConsulta
      }
    : {
        direccionVientoHacia: document.getElementById("in-dir").value,
        velocidadVientoKmh: +document.getElementById("in-vel").value,
        fuenteViento: "manual"
      };

  const pendiente = pa.activo
    ? {
        pendientePct: Math.round(pa.datos.pendientePct),
        sentidoLadera: pa.datos.sentidoLadera,
        fuentePendiente: "Open-Meteo elevación, provisional"
      }
    : {
        pendientePct: +document.getElementById("in-pen").value,
        sentidoLadera: document.getElementById("in-sentido").value,
        fuentePendiente: "manual"
      };

  return {
    direccionVientoHacia: viento.direccionVientoHacia,
    velocidadVientoKmh: viento.velocidadVientoKmh,
    fuenteViento: viento.fuenteViento,
    pendientePct: pendiente.pendientePct,
    sentidoLadera: pendiente.sentidoLadera,
    fuentePendiente: pendiente.fuentePendiente,
    tipoCombustible: document.getElementById("in-comb").value,
    fuenteCombustible: "manual"
  };
}

function calcular() {
  const ent = leerEntradas();
  const r = evaluarAlertaFuego({
    latFuego: estado.fuego.lat, lonFuego: estado.fuego.lon,
    latZona: estado.zona.lat, lonZona: estado.zona.lon,
    direccionVientoHacia: ent.direccionVientoHacia,
    velocidadVientoKmh: ent.velocidadVientoKmh,
    tipoCombustible: ent.tipoCombustible,
    pendientePct: ent.pendientePct,
    sentidoLadera: ent.sentidoLadera
  });
  estado.resultado = {
    distanciaM: r.distanciaM,
    rumboFuegoZona: r.rumboFuegoZona,
    direccionVientoGrados: r.direccionVientoGrados,
    diferenciaFirmada: r.diferenciaFirmada,
    cuadrante: r.cuadrante,
    v0: r.v0, fv: r.fv, fp: r.fp, vpif: r.vpif,
    tiempoMin: r.tiempoMin,
    tiempoTexto: r.tiempoTexto,
    escenario: r.escenario,
    entradas: ent,
    vientoAutoDatos: estado.vientoAuto.activo ? estado.vientoAuto.datos : null,
    penAutoDatos: estado.penAuto.activo ? estado.penAuto.datos : null
  };
  dibujarCuadrantes(r);
  pintarResultado();
  document.getElementById("inputs").classList.remove("abierto");
  document.getElementById("btn-datos").textContent = "Datos ▾";
  document.getElementById("resultado").classList.add("abierto");
  refrescar();
}

// === PINTADO DEL RESULTADO ===

function formatearMetros(m) {
  return m >= 1000 ? (m / 1000).toFixed(2) + " km" : Math.round(m) + " m";
}

function pintarResultado() {
  const r = estado.resultado;
  const t = TEXTO_CUADRANTE[r.cuadrante];
  const ent = r.entradas;

  // Regla de presentación: fuera de la trayectoria principal se muestra
  // vigilancia preventiva, no el protocolo de tiempos.
  const escenarioProtocolo = r.cuadrante === "sin_riesgo" ? "vigilancia_preventiva" : r.escenario;
  const p = PROTOCOLOS[escenarioProtocolo];

  let tiempoV, tiempoS;
  if (r.cuadrante === "riesgo") {
    tiempoV = r.tiempoTexto;
    tiempoS = "Estimación principal: la zona está en el cuadrante de riesgo. Úsala para retirarte antes, no para apurar.";
  } else if (r.cuadrante === "sin_riesgo") {
    tiempoV = "No prioritario";
    tiempoS = "No se muestra como alerta principal con la dirección actual del viento.";
  } else {
    tiempoV = r.tiempoTexto;
    tiempoS = "Referencia prudencial por si el frente deriva lateralmente.";
  }

  const acciones = p.acciones.map(function (a) { return "<li>" + a + "</li>"; }).join("");

  let tecExtra = "";
  if (r.vientoAutoDatos) {
    const dv = r.vientoAutoDatos;
    tecExtra += "Viento Open-Meteo: sopla desde " + Math.round(dv.desdeGrados) + "° → empuja hacia " +
      Math.round(dv.haciaGrados) + "° (" + dv.haciaCardinal + "), consultado a las " + dv.horaConsulta + ".<br>";
  }
  if (r.penAutoDatos) {
    const dp = r.penAutoDatos;
    const signo = dp.desnivelM >= 0 ? "+" : "";
    tecExtra += "Elevaciones Open-Meteo: incendio " + Math.round(dp.elevFuegoM) + " m · zona " +
      Math.round(dp.elevZonaM) + " m · desnivel " + signo + Math.round(dp.desnivelM) + " m.<br>";
  }

  document.getElementById("resultado").innerHTML =
    '<div class="estado ' + t.clase + '">' +
      '<div class="etiqueta">' + t.etiqueta + "</div>" +
      '<div class="titulo">' + t.titulo + "</div>" +
      '<div class="desc">' + t.desc + "</div>" +
    "</div>" +

    '<div class="metricas">' +
      '<div class="metrica"><div class="l">Distancia</div><div class="v">' + formatearMetros(r.distanciaM) +
        '</div><div class="s">Entre incendio y zona vulnerable.</div></div>' +
      '<div class="metrica"><div class="l">Tiempo estimado</div><div class="v">' + tiempoV +
        '</div><div class="s">' + tiempoS + "</div></div>" +
      '<div class="metrica"><div class="l">VPIF</div><div class="v">' + r.vpif.toFixed(1) +
        ' m/min</div><div class="s">V0 · FV · FP = ' + r.v0 + " · " + r.fv + " · " + r.fp + "</div></div>" +
    "</div>" +

    '<div class="datos-usados"><b>Datos usados:</b> pendiente ' + ent.pendientePct + " % (el fuego avanza " + ent.sentidoLadera + ")" +
      " (" + ent.fuentePendiente + ") · viento " + ent.velocidadVientoKmh + " km/h empujando hacia " + ent.direccionVientoHacia +
      " (" + ent.fuenteViento + ") · " + NOMBRE_COMBUSTIBLE[ent.tipoCombustible] + " (" + ent.fuenteCombustible + ").</div>" +

    '<details class="bloque" open>' +
      "<summary>" + p.encabezado + ": " + p.titulo + "</summary>" +
      "<ul>" + acciones + "</ul>" +
    "</details>" +

    '<details class="bloque">' +
      "<summary>Detalles técnicos del cálculo</summary>" +
      '<div class="tec">' +
        "Rumbo incendio → zona: " + r.rumboFuegoZona.toFixed(1) + "° · Dirección del viento: " +
        r.direccionVientoGrados + "° · Diferencia angular: " + r.diferenciaFirmada.toFixed(1) + "°<br>" +
        "Cuadrante: " + NOMBRE_CUADRANTE[r.cuadrante] + " · Escenario por tiempo: " + NOMBRE_ESCENARIO[r.escenario] + "<br>" +
        tecExtra +
        "VPIF = " + r.v0 + " · " + r.fv + " · " + r.fp + " = " + r.vpif.toFixed(2) + " m/min · " +
        "Tiempo = " + Math.round(r.distanciaM) + " m / " + r.vpif.toFixed(2) + " = " + r.tiempoMin.toFixed(1) + " min" +
      "</div>" +
    "</details>" +

    '<div class="recordatorio"><strong>Recordatorio:</strong> estimación grosera y orientativa, no un modelo profesional. ' +
      "Úsala para anticiparte, retirarte antes y preparar decisiones prudentes; nunca para apurar tiempos ni justificar " +
      "entrar o permanecer en zonas comprometidas. Ante peligro: <strong>112</strong>.</div>";

  const resumen = document.getElementById("resumen");
  resumen.className = t.clase;
  resumen.style.display = "flex";
  const tiempoResumen = r.cuadrante === "sin_riesgo" ? "vigilancia preventiva" : r.tiempoTexto;
  document.getElementById("resumen-texto").textContent =
    t.titulo + " · " + tiempoResumen + " · " + formatearMetros(r.distanciaM);
}

// === EDITOR DE COORDENADAS ===

function abrirEditor(tipo) {
  estado.editor = tipo;
  const nombre = tipo === "fuego" ? "🔥 Incendio" : "🏠 Zona vulnerable";
  document.getElementById("editor-titulo").textContent = nombre + ":";
  const p = estado[tipo];
  document.getElementById("editor-input").value = p ? p.lat + ", " + p.lon : "";
  document.getElementById("editor-msg").textContent = "";
  document.getElementById("editor").hidden = false;
  document.getElementById("editor-input").focus();
}

function cerrarEditor() {
  estado.editor = null;
  document.getElementById("editor").hidden = true;
}

const RESOLVER_URL = (window.CONFIG_RESOLVER || "").replace(/\/+$/, "");

async function aplicarEditor() {
  const tipo = estado.editor;
  if (!tipo) return;
  const texto = document.getElementById("editor-input").value;
  let r = parsearUbicacion(texto);

  // Enlace corto: intentar resolverlo con el servicio propio, si está configurado
  if (!r.ok && r.motivo === "enlace_corto" && RESOLVER_URL) {
    const enlace = (texto.match(/https?:\/\/\S+/) || [""])[0];
    document.getElementById("editor-msg").textContent = "Resolviendo enlace corto…";
    try {
      const resp = await fetchJson(RESOLVER_URL + "/resolver?url=" + encodeURIComponent(enlace));
      if (resp && resp.url_final) r = parsearUbicacion(resp.url_final);
    } catch (e) {
      // se mantiene r con motivo enlace_corto y cae al mensaje estándar
    }
    if (estado.editor !== tipo) return; // el usuario cerró o cambió mientras tanto
  }

  if (!r.ok) {
    const mensajes = {
      enlace_corto: RESOLVER_URL
        ? "No se pudo resolver el enlace corto (servicio no disponible). Abre el enlace en el navegador y copia la URL completa, o pega las coordenadas directamente."
        : "Los enlaces cortos de Google Maps no incluyen coordenadas. Abre el enlace en el navegador y copia la URL completa de la barra de direcciones, o pega las coordenadas directamente.",
      utm: "Ese enlace del IGN usa coordenadas UTM. En el visor Iberpix, copia latitud y longitud del panel de coordenadas y pégalas aquí (ej. 40.1290, -5.4610).",
      formato: "No reconozco esa ubicación. Pega coordenadas (ej. 40.1290, -5.4610) o un enlace completo de Google Maps."
    };
    document.getElementById("editor-msg").textContent = mensajes[r.motivo] || mensajes.formato;
    return;
  }
  fijarPunto(tipo, { lat: r.lat, lng: r.lon });
  map.setView([r.lat, r.lon], Math.max(map.getZoom(), 13));
  mostrarToast((tipo === "fuego" ? "Incendio" : "Zona vulnerable") + " fijado en " + r.lat + ", " + r.lon);
  cerrarEditor();
}

// === TOAST ===

let toastTimer = null;
function mostrarToast(texto) {
  let el = document.getElementById("toast");
  if (!el) {
    el = document.createElement("div");
    el.id = "toast";
    el.className = "toast";
    document.body.appendChild(el);
  }
  el.textContent = texto;
  el.classList.add("on");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function () { el.classList.remove("on"); }, 3200);
}

// === GEOLOCALIZACIÓN ===

function usarMiUbicacion() {
  if (!navigator.geolocation) {
    mostrarToast("Tu navegador no soporta geolocalización.");
    return;
  }
  mostrarToast("Obteniendo tu ubicación…");
  navigator.geolocation.getCurrentPosition(
    function (pos) {
      const lat = pos.coords.latitude, lon = pos.coords.longitude;
      fijarPunto("zona", { lat: lat, lng: lon });
      map.setView([lat, lon], Math.max(map.getZoom(), 15));
      mostrarToast("Zona vulnerable fijada en tu ubicación (±" + Math.round(pos.coords.accuracy) + " m).");
    },
    function (err) {
      const msgs = {
        1: "Permiso de ubicación denegado. Actívalo en el navegador.",
        2: "Ubicación no disponible ahora mismo.",
        3: "Tiempo de espera agotado al obtener la ubicación."
      };
      mostrarToast(msgs[err.code] || "No se pudo obtener la ubicación.");
    },
    { enableHighAccuracy: true, timeout: 8000, maximumAge: 30000 }
  );
}

// === INTERFAZ GENERAL ===

function motivosBloqueo() {
  const motivos = [];
  if (!estado.fuego || !estado.zona) motivos.push("fija el incendio y la zona vulnerable en el mapa");

  const va = estado.vientoAuto, pa = estado.penAuto;

  // Viento
  if (va.activo) {
    if (va.cargando) motivos.push("consultando viento…");
    else if (!va.datos && estado.fuego) motivos.push("viento automático no disponible (reintenta o pasa a manual)");
  } else {
    const dirElegida = document.getElementById("in-dir").value !== "";
    if (!dirElegida || !estado.velElegida) motivos.push("elige dirección y velocidad del viento");
  }

  // Pendiente
  if (pa.activo) {
    if (pa.cargando) motivos.push("consultando elevaciones…");
    else if (!pa.datos && estado.fuego && estado.zona) motivos.push("pendiente automática no disponible (reintenta o pasa a manual)");
  } else {
    const sentidoElegido = document.getElementById("in-sentido").value !== "";
    if (!estado.penElegida || !sentidoElegido) motivos.push("elige la pendiente y el sentido de la ladera");
  }

  // Combustible (siempre manual)
  if (document.getElementById("in-comb").value === "") motivos.push("elige el combustible");

  return motivos;
}

function refrescar() {
  const f = estado.fuego, z = estado.zona;

  document.getElementById("coords-fuego").textContent =
    f ? f.lat + ", " + f.lon : "Sin fijar — toca el mapa";
  document.getElementById("coords-zona").textContent =
    z ? z.lat + ", " + z.lon : "Sin fijar";

  document.getElementById("chip-fuego").classList.toggle("activo", estado.objetivo === "fuego");
  document.getElementById("chip-zona").classList.toggle("activo", estado.objetivo === "zona");

  const nombre = estado.objetivo === "fuego" ? "el <b>incendio</b>" : "la <b>zona vulnerable</b>";
  document.getElementById("hint").innerHTML =
    "El próximo toque en el mapa fija " + nombre + ". Arrastra los marcadores para ajustar; ✎ para escribir coordenadas o pegar un enlace.";

  if (linea) { map.removeLayer(linea); linea = null; }
  if (f && z) {
    linea = L.polyline([[f.lat, f.lon], [z.lat, z.lon]], { color: "#eab308", weight: 5 }).addTo(map);
  }

  const motivos = motivosBloqueo();
  document.getElementById("btn-calcular").disabled = motivos.length > 0;
  const hintCalc = document.getElementById("hint-calc");
  if (motivos.length > 0) {
    hintCalc.textContent = "Para calcular: " + motivos.join(" · ") + ".";
  } else if (estado.resultado === null) {
    hintCalc.textContent = "Todo listo. Revisa los datos si lo necesitas y pulsa Calcular alerta.";
  } else {
    hintCalc.textContent = "";
  }
}

// === CONEXIÓN DE EVENTOS ===

document.getElementById("chip-fuego").addEventListener("click", function () {
  estado.objetivo = "fuego"; refrescar();
});
document.getElementById("chip-zona").addEventListener("click", function () {
  estado.objetivo = "zona"; refrescar();
});
document.getElementById("editar-fuego").addEventListener("click", function (e) {
  e.stopPropagation(); estado.objetivo = "fuego"; refrescar(); abrirEditor("fuego");
});
document.getElementById("editar-zona").addEventListener("click", function (e) {
  e.stopPropagation(); estado.objetivo = "zona"; refrescar(); abrirEditor("zona");
});
document.getElementById("editor-aplicar").addEventListener("click", aplicarEditor);
document.getElementById("editor-cancelar").addEventListener("click", cerrarEditor);
document.getElementById("editor-input").addEventListener("keydown", function (e) {
  if (e.key === "Enter") aplicarEditor();
  if (e.key === "Escape") cerrarEditor();
});

document.getElementById("btn-geo").addEventListener("click", usarMiUbicacion);

document.getElementById("btn-borrar").addEventListener("click", function () {
  for (const t of ["fuego", "zona"]) {
    if (marcadores[t]) { map.removeLayer(marcadores[t]); marcadores[t] = null; }
    estado[t] = null;
  }
  estado.objetivo = "fuego";
  estado.vientoAuto.datos = null; estado.vientoAuto.error = null;
  estado.penAuto.datos = null; estado.penAuto.error = null;
  estado.velElegida = false; estado.penElegida = false;
  document.getElementById("wrap-vel").classList.add("sin-elegir");
  document.getElementById("wrap-pen").classList.add("sin-elegir");
  document.getElementById("out-vel").textContent = "sin elegir";
  document.getElementById("out-pen").textContent = "sin elegir";
  document.getElementById("in-dir").value = "";
  document.getElementById("in-sentido").value = "";
  document.getElementById("in-comb").value = "";
  cerrarEditor();
  invalidarResultado();
  renderVientoAuto();
  renderPendienteAuto();
  refrescar();
});

document.getElementById("btn-datos").addEventListener("click", function () {
  const abierto = document.getElementById("inputs").classList.toggle("abierto");
  document.getElementById("btn-datos").textContent = abierto ? "Datos ▴" : "Datos ▾";
});
document.getElementById("btn-calcular").addEventListener("click", calcular);
document.getElementById("resumen").addEventListener("click", function () {
  document.getElementById("resultado").classList.toggle("abierto");
});

document.getElementById("chk-viento-auto").addEventListener("change", function (e) {
  estado.vientoAuto.activo = e.target.checked;
  invalidarResultado();
  actualizarVientoAuto();
});
document.getElementById("chk-pen-auto").addEventListener("change", function (e) {
  estado.penAuto.activo = e.target.checked;
  invalidarResultado();
  actualizarPendienteAuto();
});

function marcarVelElegida() {
  if (estado.velElegida) return;
  estado.velElegida = true;
  document.getElementById("wrap-vel").classList.remove("sin-elegir");
  document.getElementById("out-vel").textContent = document.getElementById("in-vel").value + " km/h";
}
function marcarPenElegida() {
  if (estado.penElegida) return;
  estado.penElegida = true;
  document.getElementById("wrap-pen").classList.remove("sin-elegir");
  document.getElementById("out-pen").textContent = document.getElementById("in-pen").value + " %";
}

const IDS_SELECTS = ["in-dir", "in-comb", "in-sentido"];
for (const idSel of IDS_SELECTS) {
  document.getElementById(idSel).addEventListener("change", function () {
    invalidarResultado(); refrescar();
  });
}

document.getElementById("in-vel").addEventListener("pointerdown", marcarVelElegida);
document.getElementById("in-vel").addEventListener("input", function (e) {
  marcarVelElegida();
  document.getElementById("out-vel").textContent = e.target.value + " km/h";
  invalidarResultado(); refrescar();
});
document.getElementById("in-pen").addEventListener("pointerdown", marcarPenElegida);
document.getElementById("in-pen").addEventListener("input", function (e) {
  marcarPenElegida();
  document.getElementById("out-pen").textContent = e.target.value + " %";
  invalidarResultado(); refrescar();
});

renderVientoAuto();
renderPendienteAuto();
refrescar();
</script>
